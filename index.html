<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday Dakshu Dii 🎉</title>

<style>
body {
  margin:0;
  font-family: 'Comic Sans MS', cursive;
  background:white;
  overflow:hidden;
}

/* FLOATING PAGE */
.page {
  display:none;
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  width:90%;
  max-width:380px;
  background:#b3002d;
  color:white;
  padding:20px;
  border-radius:20px;
  text-align:center;
  box-shadow:0 10px 30px rgba(0,0,0,0.3);
}

/* ACTIVE PAGE */
.active {
  display:block;
}

/* BUTTONS */
button {
  margin:10px;
  padding:8px 16px;
  border:none;
  border-radius:10px;
  background:white;
  color:#b3002d;
  font-weight:bold;
}

/* BALLOONS */
.balloon {
  position:absolute;
  width:40px;
  height:50px;
  border-radius:50%;
  animation:float 6s infinite;
}

.balloon::after {
  content:'';
  position:absolute;
  bottom:-15px;
  left:50%;
  width:2px;
  height:20px;
  background:black;
}

.balloon::before {
  content:'🎀';
  position:absolute;
  bottom:-25px;
  left:50%;
  transform:translateX(-50%);
}

@keyframes float {
  0% {transform:translateY(0);}
  100% {transform:translateY(-100vh);}
}

/* GIFT BOX */
.gift {
  font-size:60px;
  cursor:pointer;
  animation:shake 1s infinite;
}

@keyframes shake {
  0%{transform:rotate(0);}
  25%{transform:rotate(5deg);}
  50%{transform:rotate(0);}
  75%{transform:rotate(-5deg);}
}

/* PHOTO GRID */
.photo-container {
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:10px;
  margin-top:10px;
}

.photo-container img {
  width:140px;
  height:180px;
  object-fit:cover;
  border-radius:10px;
  border:3px solid white;
}

/* SLANG */
.slang {
  grid-column:span 2;
  background:white;
  color:#b3002d;
  padding:8px;
  border-radius:20px;
  font-weight:bold;
}

/* FINAL PAGE PHOTOS */
.final-photos img {
  width:160px;
  height:200px;
  margin:5px;
  border-radius:10px;
  border:3px solid white;
}

/* MOBILE */
@media(max-width:600px){
  .photo-container img{
    width:120px;
    height:150px;
  }
}
</style>
</head>

<body>

<!-- BALLOONS -->
<div class="balloon" style="left:10%; background:#ff4d4d;"></div>
<div class="balloon" style="left:30%; background:#ff1a75;"></div>
<div class="balloon" style="left:60%; background:#cc0066;"></div>
<div class="balloon" style="left:80%; background:#99004d;"></div>

<!-- PAGE 1 -->
<div class="page active">
  <h2>🎉 Happy Birthday Dakshu Dii 🎉</h2>
  <p>🥳🎊</p>
  <button onclick="nextPage()">Next ➡️</button>
</div>

<!-- PAGE 2 (GIFTS) -->
<div class="page">
  <h3>Open Gifts 🎁</h3>
  <div class="gift" onclick="openPage(2)">🎁</div>
  <div class="gift" onclick="openPage(3)">🎁</div>
  <br>
  <button onclick="prevPage()">⬅️ Back</button>
  <button onclick="goToPage(4)">Next ➡️</button>
</div>

<!-- LETTER 1 -->
<div class="page">
  <p>You are the sweetest bestie ever 💖</p>
  <button onclick="goToPage(1)">⬅️ Back</button>
</div>

<!-- LETTER 2 -->
<div class="page">
  <p>Always stay happy and smiling 😊</p>
  <button onclick="goToPage(1)">⬅️ Back</button>
</div>

<!-- PAGE 3 -->
<div class="page">
  <div class="photo-container">
    <div class="slang">Cutie 💖</div>
    <img src="images/photo1.jpeg">
    <img src="images/photo2.jpeg">
    <img src="images/photo3.jpeg">
    <img src="images/photo4.jpeg">
    <img src="images/photo5.jpeg">
  </div>
  <button onclick="prevPage()">⬅️</button>
  <button onclick="nextPage()">➡️</button>
</div>

<!-- PAGE 4 -->
<div class="page">
  <div class="photo-container">
    <div class="slang">Beautiful 😍</div>
    <img src="images/photo6.jpeg">
    <img src="images/photo7.jpeg">
    <img src="images/photo8.jpeg">
    <img src="images/photo9.jpeg">
    <img src="images/photo10.jpeg">
  </div>
  <button onclick="prevPage()">⬅️</button>
  <button onclick="nextPage()">➡️</button>
</div>

<!-- PAGE 5 -->
<div class="page">
  <div class="photo-container">
    <div class="slang">Fav Person 💕</div>
    <img src="images/photo11.jpeg">
    <img src="images/photo12.jpeg">
    <img src="images/photo13.jpeg">
    <img src="images/photo14.jpeg">
    <img src="images/photo15.jpeg">
  </div>
  <button onclick="prevPage()">⬅️</button>
  <button onclick="nextPage()">➡️</button>
</div>

<!-- FINAL PAGE -->
<div class="page">
  <h3>Have a wonderful year 💖</h3>
  <p>Stay happy always 😊</p>
  <div class="final-photos">
    <img src="images/photo10.jpeg">
    <img src="images/photo11.jpeg">
    <img src="images/photo15.jpeg">
  </div>
  <p>Regards,<br>Srushti & Atharv 💕</p>
  <button onclick="prevPage()">⬅️</button>
</div>

<script>
let pages = document.querySelectorAll(".page");
let current = 0;

function showPage(i){
  pages[current].classList.remove("active");
  current = i;
  pages[current].classList.add("active");
}

function nextPage(){
  if(current < pages.length-1) showPage(current+1);
}

function prevPage(){
  if(current > 0) showPage(current-1);
}

function goToPage(i){
  showPage(i);
}

function openPage(i){
  showPage(i);
}
</script>

</body>
</html>
