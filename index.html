<!DOCTYPE html>
<html>
<head>
<title>Happy Birthday 💖</title>
<style>
body{
margin:0;
padding:0;
background:linear-gradient(to right,#ff9a9e,#fad0c4);
font-family:Comic Sans MS;
overflow:hidden;
text-align:center;
}

h1{
margin-top:20%;
font-size:40px;
color:white;
}

.page{
position:absolute;
width:200px;
height:200px;
background:white;
border-radius:20px;
display:flex;
align-items:center;
justify-content:center;
box-shadow:0 0 20px rgba(0,0,0,0.2);
animation:float 6s infinite ease-in-out;
}

.page:nth-child(2){top:10%; left:20%;}
.page:nth-child(3){top:50%; left:70%;}
.page:nth-child(4){top:70%; left:30%;}

@keyframes float{
0%{transform:translateY(0);}
50%{transform:translateY(-30px);}
100%{transform:translateY(0);}
}
</style>
</head>

<body>

<h1>Happy Birthday Bestie 💖</h1>

<div class="page">You are special 💫</div>
<div class="page">Stay happy always 😊</div>
<div class="page">My fav person ❤️</div>

</body>
</html>
